name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  test:
    name: test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt
      - uses: Swatinem/rust-cache@v2
      - name: Check formatting
        run: cargo fmt --all -- --check
      - name: Lint
        run: cargo clippy --all-targets --all-features -- -D warnings
      - name: Test
        run: cargo test --all-features --workspace

  msrv:
    name: MSRV
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@1.85.0
      - uses: Swatinem/rust-cache@v2
      - name: Check MSRV
        run: cargo check --all-features --workspace

  native-integration:
    name: native integration (linux)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Run ignored native scheduler tests
        run: cargo test --test integration_linux -- --ignored --nocapture

  coverage:
    name: coverage
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@nightly
      - uses: Swatinem/rust-cache@v2
      - uses: taiki-e/install-action@cargo-llvm-cov
      - name: Generate coverage
        env:
          RUSTFLAGS: --cfg coverage_nightly
        run: >
          cargo +nightly llvm-cov --all-features --workspace --fail-under-lines 100
          --codecov --output-path codecov.json
      - name: Upload coverage
        uses: codecov/codecov-action@v7
        with:
          files: codecov.json
          # cargo-llvm-cov above is the blocking 100% gate; Codecov upload can
          # fail until the repository is activated/configured in Codecov.
          fail_ci_if_error: false
          use_oidc: true

  deny:
    name: cargo-deny (${{ matrix.target }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        target:
          - x86_64-unknown-linux-gnu
          - aarch64-unknown-linux-gnu
          - x86_64-apple-darwin
          - aarch64-apple-darwin
          - x86_64-pc-windows-msvc
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - name: Generate target-filtered cargo metadata
        run: |
          mkdir -p target/deny
          cargo metadata --all-features --filter-platform ${{ matrix.target }} --format-version 1 > target/deny/${{ matrix.target }}.json
      - uses: EmbarkStudios/cargo-deny-action@v2
        with:
          command: check
          arguments: --all-features
          command-arguments: --metadata-path target/deny/${{ matrix.target }}.json
