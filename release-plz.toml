# ccplan is published to crates.io (`cargo install ccplan`) and also distributed
# as prebuilt binaries via cargo-dist (GitHub Releases on tag push). The first
# publish was done manually (`cargo publish`); with that crate version now in the
# registry, release-plz can run `cargo publish` for future versions and compute
# version diffs from the registry. Do not flip this back to `false` — that would
# stop publishing and reintroduce the git-tag/registry version-diff mismatch.
[workspace]
publish = true
